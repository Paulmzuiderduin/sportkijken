name: Update Sports TV Guide Data

on:
  schedule:
    - cron: '17 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sports-data-refresh
  cancel-in-progress: true

jobs:
  update_dataset:
    name: Build and publish latest sports events
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Refresh events dataset + runtime metadata
        run: npm run data:update

      - name: Commit and push when changed
        run: |
          if git diff --quiet; then
            echo "No data/runtime changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/events.nl.json public/events.nl.json public/events.meta.json public/datasets public/sitemap.xml

          if git diff --quiet --cached -- src/data/events.nl.json; then
            git commit -m "chore(data): refresh source-check timestamp"
          else
            git commit -m "chore(data): refresh sports schedule"
          fi

          TARGET_BRANCH="${GITHUB_REF_NAME:-main}"

          for attempt in 1 2 3; do
            echo "Push attempt ${attempt} to ${TARGET_BRANCH}..."
            if git push origin "HEAD:${TARGET_BRANCH}"; then
              echo "Push succeeded."
              exit 0
            fi

            echo "Push rejected. Rebasing onto latest ${TARGET_BRANCH} and retrying."
            if ! git pull --rebase --autostash origin "${TARGET_BRANCH}"; then
              echo "Rebase failed (likely concurrent edit conflict on dataset). Skipping this run."
              exit 0
            fi
          done

          echo "Could not push after retries due to concurrent updates. Skipping without failure."
          exit 0
